name: Extração Twilio - Saldos (5 min)

# Leve (Balance.json por conta); cadência ~5 min para a dashboard acompanhar saldo.
# Offset +1 min face a delivery-only (2-59/5) para reduzir picos na fila do Actions.
on:
  schedule:
    - cron: "1-59/5 * * * *"
  repository_dispatch:
    types: [saldo_tick]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: twilio-saldo-run-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  saldos:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🔐 Validar token do scheduler externo
        env:
          EXPECTED_TOKEN: ${{ secrets.EXTERNAL_DISPATCH_TOKEN }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "repository_dispatch" ]; then
            echo "Evento $GITHUB_EVENT_NAME: validacao de token nao aplicavel."
            exit 0
          fi
          if [ -z "$EXPECTED_TOKEN" ]; then
            echo "EXTERNAL_DISPATCH_TOKEN nao configurado; mantendo compatibilidade sem token."
            exit 0
          fi
          PAYLOAD_TOKEN="$(jq -r '.client_payload.token // ""' "$GITHUB_EVENT_PATH")"
          if [ -z "$PAYLOAD_TOKEN" ] || [ "$PAYLOAD_TOKEN" != "$EXPECTED_TOKEN" ]; then
            echo "repository_dispatch rejeitado: token invalido ou ausente."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 💰 Extrator de Saldos
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: python saldo_extractor.py
      - uses: actions/upload-artifact@v4
        with:
          name: csv-saldos
          path: conf_saldos.csv

  commitar-saldo:
    runs-on: ubuntu-latest
    needs: [saldos]
    concurrency:
      group: twilio-saldo-commit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: csv-saldos
      - name: 💾 Commitar conf_saldos.csv
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          cp conf_saldos.csv /tmp/conf_saldos.csv
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/conf_saldos.csv conf_saldos.csv
          git add conf_saldos.csv
          git diff --staged --quiet || git commit -m "chore: atualiza saldos Twilio [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          for attempt in 1 2 3 4 5; do
            if git push origin master; then
              echo "Push OK (tentativa $attempt)"
              exit 0
            fi
            echo "Push falhou; fetch/rebase e nova tentativa $attempt..."
            git fetch origin master
            git pull --rebase origin master || true
            sleep $((attempt * 8))
          done
          echo "Push falhou apos 5 tentativas"
          exit 1
