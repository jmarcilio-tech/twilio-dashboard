# Snapshot alinhado à consola: SMS > Insights > Delivery & Errors (Past N h, Outgoing).
# Gera conf_delivery_insights_4h.csv (modo activity por defeito).
name: Delivery — Insights snapshot (4h)

on:
  schedule:
    - cron: "12,42 * * * *"
  workflow_dispatch:
    inputs:
      insights_hours:
        description: "Janela em horas (ex. 4 = Past 4 hours na consola)"
        type: string
        default: "4"
      list_mode:
        description: "activity (default) ou sent"
        type: choice
        default: activity
        options:
          - activity
          - sent

permissions:
  contents: write

concurrency:
  group: twilio-delivery-insights-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DELIVERY_INSIGHTS_WRITE_CSV: "1"
  DELIVERY_INSIGHTS_HOURS: "4"
  DELIVERY_INSIGHTS_LIST_MODE: activity
  DELIVERY_DIRECTION: outbound
  DELIVERY_INSIGHTS_MAX_PAGES: "150"
  DELIVERY_INSIGHTS_STOP_EMPTY: "5"
  PYTHONUNBUFFERED: "1"

jobs:
  insights:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Insights Delivery & Errors → CSV
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: |
          export DELIVERY_INSIGHTS_WRITE_CSV=1
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            H="${{ github.event.inputs.insights_hours }}"
            LM="${{ github.event.inputs.list_mode }}"
            if [ -n "$H" ] && [ "$H" != "null" ]; then export DELIVERY_INSIGHTS_HOURS="$H"; fi
            if [ -n "$LM" ] && [ "$LM" != "null" ]; then export DELIVERY_INSIGHTS_LIST_MODE="$LM"; fi
          fi
          python scripts/fetch_delivery_insights_snapshot.py
      - uses: actions/upload-artifact@v4
        with:
          name: delivery-insights-csv
          if-no-files-found: error
          path: conf_delivery_insights_4h.csv

  commitar-insights:
    runs-on: ubuntu-latest
    needs: [insights]
    concurrency:
      group: twilio-delivery-insights-commit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: delivery-insights-csv
      - name: Commitar snapshot insights
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          cp conf_delivery_insights_4h.csv /tmp/conf_delivery_insights_4h.csv
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/conf_delivery_insights_4h.csv conf_delivery_insights_4h.csv
          git add conf_delivery_insights_4h.csv
          git diff --staged --quiet || git commit -m "chore: delivery insights 4h snapshot [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin master
