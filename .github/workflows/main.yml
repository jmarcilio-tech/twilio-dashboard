name: Extração Twilio - A cada 5 minutos

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  financeiro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 🚀 Extrator Financeiro
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: python extratorv2.py
      - uses: actions/upload-artifact@v4
        with:
          name: csv-financeiro
          path: |
            conf_total_marco.csv
            conf_detalhado_marco.csv

  delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 📡 Extrator Delivery & Errors
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
          DELIVERY_JANELA_HORAS: ${{ secrets.DELIVERY_JANELA_HORAS }}
        run: python delivery_extractor.py
      - uses: actions/upload-artifact@v4
        with:
          name: csv-delivery
          path: |
            conf_delivery_stats.csv
            conf_delivery_horario.csv

  saldos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 💰 Extrator de Saldos
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: python saldo_extractor.py
      - uses: actions/upload-artifact@v4
        with:
          name: csv-saldos
          path: conf_saldos.csv

  commitar:
    runs-on: ubuntu-latest
    needs: [financeiro, delivery, saldos]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # Essencial para evitar o erro 128 no rebase

      - uses: actions/download-artifact@v4
        with:
          name: csv-financeiro
      - uses: actions/download-artifact@v4
        with:
          name: csv-delivery
      - uses: actions/download-artifact@v4
        with:
          name: csv-saldos

      - name: 💾 Sincronizar e Commitar
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Puxa as novidades ANTES de adicionar os arquivos (Evita erro 128)
          git pull origin main --rebase
          
          # 2. Adiciona os novos dados
          git add *.csv
          
          # 3. Commita apenas se houver mudanças reais
          if ! git diff --staged --quiet; then
            git commit -m "chore: atualiza CSVs Twilio [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
          else
            echo "Nenhuma mudança detectada nos CSVs."
          fi