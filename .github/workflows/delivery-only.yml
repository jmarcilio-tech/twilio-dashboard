name: Extração Twilio - Delivery (5 min)

# Workflow dedicado ao delivery para reduzir filas dos jobs pesados.
on:
  schedule:
    - cron: "2-59/5 * * * *"
  repository_dispatch:
    types: [delivery_tick]
  workflow_dispatch:
    inputs:
      delivery_fetch_mode:
        description: "auto=mês 1× + depois 5min; baseline_24h=teste; baseline_mes=forçar mês; incremental=só janela"
        type: choice
        default: auto
        options:
          - auto
          - incremental
          - baseline_mes
          - baseline_24h

permissions:
  contents: write

# Reduz backlog: mantém só a execução mais recente de delivery por branch.
concurrency:
  group: twilio-delivery-run-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Janela só em modo incremental (5 min). Baseline mensal/24h ignora isto para o DateSent>.
  DELIVERY_JANELA_HORAS: "0.0833333333"
  # workflow_dispatch pode forçar modo; scheduler externo usa incremental para máxima previsibilidade.
  DELIVERY_FETCH_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.delivery_fetch_mode || (github.event_name == 'repository_dispatch' && 'incremental' || 'auto') }}
  # outbound = mesmo recorte que Messaging Insights → Delivery & Errors → Outgoing
  DELIVERY_DIRECTION: outbound

jobs:
  delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: 🔐 Validar token do scheduler externo
        if: ${{ github.event_name == 'repository_dispatch' && secrets.EXTERNAL_DISPATCH_TOKEN != '' }}
        env:
          PAYLOAD_TOKEN: ${{ github.event.client_payload.token || '' }}
          EXPECTED_TOKEN: ${{ secrets.EXTERNAL_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PAYLOAD_TOKEN" ] || [ "$PAYLOAD_TOKEN" != "$EXPECTED_TOKEN" ]; then
            echo "repository_dispatch rejeitado: token invalido ou ausente."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: 📡 Extrator Delivery & Errors
        env:
          DELIVERY_JANELA_HORAS: ${{ env.DELIVERY_JANELA_HORAS }}
          DELIVERY_FETCH_MODE: ${{ env.DELIVERY_FETCH_MODE }}
          DELIVERY_DIRECTION: ${{ env.DELIVERY_DIRECTION }}
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: python delivery_extractor.py
      - uses: actions/upload-artifact@v4
        with:
          name: csv-delivery
          path: |
            conf_delivery_stats.csv
            conf_delivery_horario.csv
            delivery_sync_state.json

  commitar-delivery:
    runs-on: ubuntu-latest
    needs: [delivery]
    # Evita dois pushes de delivery simultâneos.
    concurrency:
      group: twilio-delivery-commit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: csv-delivery
      - name: 💾 Commitar CSVs de Delivery
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          cp conf_delivery_stats.csv /tmp/conf_delivery_stats.csv
          cp conf_delivery_horario.csv /tmp/conf_delivery_horario.csv
          if [ -f delivery_sync_state.json ]; then cp delivery_sync_state.json /tmp/delivery_sync_state.json; fi
          git fetch origin master
          git reset --hard origin/master
          cp /tmp/conf_delivery_stats.csv conf_delivery_stats.csv
          cp /tmp/conf_delivery_horario.csv conf_delivery_horario.csv
          if [ -f /tmp/delivery_sync_state.json ]; then cp /tmp/delivery_sync_state.json delivery_sync_state.json; fi
          git add conf_delivery_stats.csv conf_delivery_horario.csv
          if [ -f delivery_sync_state.json ]; then git add delivery_sync_state.json; fi
          git diff --staged --quiet || git commit -m "chore: atualiza CSVs Delivery Twilio [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin master
