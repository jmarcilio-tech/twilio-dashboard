# Snapshot Billing — default rolling_24h_proxy (Daily + blend horario ~Last 24h Insights; ver script).
# Gera conf_usage_billing_snapshot.csv, conf_usage_billing_by_category.csv e conf_usage_billing_daily.csv.
name: Billing — Usage snapshot (Twilio)

on:
  schedule:
    # 4x/dia UTC: aproxima melhor janelas vs consola do que 1x/dia.
    - cron: "20 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      usage_date_strategy:
        description: "rolling_24h_proxy=Daily+blend horario (~Last 24h). end_utc_day=dia UTC. twilio_offsets=2 dias GMT inteiros. cover_days / today / start_utc_day"
        type: choice
        default: rolling_24h_proxy
        options:
          - rolling_24h_proxy
          - end_utc_day
          - twilio_offsets
          - cover_days
          - today_subresource
          - start_utc_day
      usage_utc_day:
        description: "Opcional AAAA-MM-DD forca StartDate=EndDate (sobrepoe strategy se preenchido)"
        type: string
        default: ""
      billing_month:
        description: "Opcional AAAA-MM — mes civil UTC inteiro (USAGE_START_DATE/END_DATE); sobrepoe strategy"
        type: string
        default: ""
      usage_start_date:
        description: "Opcional inicio GMT AAAA-MM-DD (com usage_end_date; sobrepoe billing_month)"
        type: string
        default: ""
      usage_end_date:
        description: "Opcional fim GMT AAAA-MM-DD (com usage_start_date)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: twilio-usage-billing-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  USAGE_WRITE_CSV: "1"
  USAGE_DATE_STRATEGY: rolling_24h_proxy
  USAGE_SNAPSHOT_HOURS: "24"
  PYTHONUNBUFFERED: "1"

jobs:
  usage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Usage Records → CSV
        env:
          RECUPERACAO_NS_SID: ${{ secrets.RECUPERACAO_NS_SID }}
          RECUPERACAO_NS_TOKEN: ${{ secrets.RECUPERACAO_NS_TOKEN }}
          BROADCAST_JOAO_SID: ${{ secrets.BROADCAST_JOAO_SID }}
          BROADCAST_JOAO_TOKEN: ${{ secrets.BROADCAST_JOAO_TOKEN }}
          BROADCAST_BERNARDO_SID: ${{ secrets.BROADCAST_BERNARDO_SID }}
          BROADCAST_BERNARDO_TOKEN: ${{ secrets.BROADCAST_BERNARDO_TOKEN }}
          BROADCAST_RAFA_SID: ${{ secrets.BROADCAST_RAFA_SID }}
          BROADCAST_RAFA_TOKEN: ${{ secrets.BROADCAST_RAFA_TOKEN }}
          STANDBY_HAVEN_SID: ${{ secrets.STANDBY_HAVEN_SID }}
          STANDBY_HAVEN_TOKEN: ${{ secrets.STANDBY_HAVEN_TOKEN }}
          STANDBY_REHABLEAF_SID: ${{ secrets.STANDBY_REHABLEAF_SID }}
          STANDBY_REHABLEAF_TOKEN: ${{ secrets.STANDBY_REHABLEAF_TOKEN }}
          STANDBY_RICHARD_SID: ${{ secrets.STANDBY_RICHARD_SID }}
          STANDBY_RICHARD_TOKEN: ${{ secrets.STANDBY_RICHARD_TOKEN }}
          STANDBY_NATUREMOVE_SID: ${{ secrets.STANDBY_NATUREMOVE_SID }}
          STANDBY_NATUREMOVE_TOKEN: ${{ secrets.STANDBY_NATUREMOVE_TOKEN }}
        run: |
          export USAGE_WRITE_CSV=1
          export USAGE_SNAPSHOT_HOURS=24
          export USAGE_DATE_STRATEGY="rolling_24h_proxy"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STRAT="${{ github.event.inputs.usage_date_strategy }}"
            DAY="${{ github.event.inputs.usage_utc_day }}"
            MON="${{ github.event.inputs.billing_month }}"
            US="${{ github.event.inputs.usage_start_date }}"
            UE="${{ github.event.inputs.usage_end_date }}"
            if [ -n "$STRAT" ] && [ "$STRAT" != "null" ]; then
              export USAGE_DATE_STRATEGY="$STRAT"
            fi
            if [ -n "$DAY" ] && [ "$DAY" != "null" ]; then
              export USAGE_UTC_DAY="$DAY"
            fi
            if [ -n "$MON" ] && [ "$MON" != "null" ] && [ ${#MON} -ge 7 ]; then
              Y=$(echo "$MON" | cut -c1-4)
              M=$(echo "$MON" | cut -c6-7)
              export USAGE_START_DATE="${Y}-${M}-01"
              export USAGE_END_DATE=$(date -u -d "${Y}-${M}-01 +1 month -1 day" +%F)
            fi
            if [ -n "$US" ] && [ "$US" != "null" ] && [ -n "$UE" ] && [ "$UE" != "null" ]; then
              export USAGE_START_DATE="$US"
              export USAGE_END_DATE="$UE"
            fi
          fi
          python scripts/fetch_usage_billing_snapshot.py
      - uses: actions/upload-artifact@v4
        with:
          name: usage-billing-csv
          if-no-files-found: warn
          path: |
            conf_usage_billing_snapshot.csv
            conf_usage_billing_by_category.csv
            conf_usage_billing_daily.csv
            month/conf_usage_billing_snapshot.csv
            month/conf_usage_billing_by_category.csv
            month/conf_usage_billing_daily.csv

  commitar-usage:
    runs-on: ubuntu-latest
    needs: [usage]
    concurrency:
      group: twilio-usage-billing-commit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: usage-billing-csv
      - name: Commitar snapshot billing
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p /tmp/usage_restore
          for f in conf_usage_billing_snapshot.csv conf_usage_billing_by_category.csv conf_usage_billing_daily.csv; do
            if [ -f "$f" ]; then cp "$f" /tmp/usage_restore/; fi
          done
          if [ -f month/conf_usage_billing_snapshot.csv ]; then
            mkdir -p /tmp/usage_restore/month
            cp month/conf_usage_billing_*.csv /tmp/usage_restore/month/ 2>/dev/null || true
          fi
          git fetch origin master
          git reset --hard origin/master
          if [ -f /tmp/usage_restore/conf_usage_billing_snapshot.csv ]; then
            cp /tmp/usage_restore/conf_usage_billing_snapshot.csv conf_usage_billing_snapshot.csv
            git add conf_usage_billing_snapshot.csv
          fi
          if [ -f /tmp/usage_restore/conf_usage_billing_by_category.csv ]; then
            cp /tmp/usage_restore/conf_usage_billing_by_category.csv conf_usage_billing_by_category.csv
            git add conf_usage_billing_by_category.csv
          fi
          if [ -f /tmp/usage_restore/conf_usage_billing_daily.csv ]; then
            cp /tmp/usage_restore/conf_usage_billing_daily.csv conf_usage_billing_daily.csv
            git add conf_usage_billing_daily.csv
          fi
          if [ -f /tmp/usage_restore/month/conf_usage_billing_snapshot.csv ]; then
            mkdir -p month
            cp /tmp/usage_restore/month/conf_usage_billing_*.csv month/
            git add month/
          fi
          git diff --staged --quiet || git commit -m "chore: billing usage snapshot Twilio [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin master
